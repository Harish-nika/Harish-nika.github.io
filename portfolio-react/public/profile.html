  <style>
    .profile-page { max-width: 920px; margin: 5.25rem auto 3rem; padding: 0 1.15rem; }
    .profile-hero {
      background: var(--container-color);
      border: 1px solid hsl(var(--hue-color), 12%, 84%);
      border-radius: 16px;
      padding: 1.5rem 1.6rem;
      margin-bottom: 1.25rem;
    }
    body.dark-theme .profile-hero { border-color: hsl(var(--hue-color), 12%, 28%); }
    .profile-hero h1 { font-size: 1.85rem; margin-bottom: 0.25rem; }
    .profile-hero .role { color: var(--first-color); font-weight: 600; font-size: 1.05rem; margin-bottom: 0.75rem; }
    .profile-hero .summary { line-height: 1.7; text-align: justify; margin-bottom: 1rem; }
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.35rem;
      font-size: 0.92rem;
      margin-bottom: 1rem;
    }
    @media (min-width: 600px) {
      .contact-grid { grid-template-columns: 1fr 1fr; }
    }
    .contact-grid a { color: var(--first-color); word-break: break-all; }
    .resume-bar {
      display: flex;

    }
    body.dark-theme .resume-bar { border-color: hsl(var(--hue-color), 12%, 28%); }
    .resume-bar__label {
      width: 100%;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.15rem;
      color: var(--title-color);
    }
    .resume-bar__hint {
      width: 100%;
      font-size: 0.8rem;
      color: var(--text-color-light);
      margin-bottom: 0.35rem;
    }
    .profile-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-bottom: 1.25rem;
    }
    .profile-nav a {
      font-size: 0.82rem;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--first-color);
      color: var(--first-color);
      text-decoration: none;
    }
    .profile-nav a:hover { background: var(--first-color); color: #fff; }
    .profile-card {
      background: var(--container-color);
      border: 1px solid hsl(var(--hue-color), 12%, 84%);
      border-radius: 14px;
      padding: 1.2rem 1.35rem;

    }
    body.dark-theme .profile-card { border-color: hsl(var(--hue-color), 12%, 28%); }
    .profile-card h2 {
      font-size: var(--h3-font-size);
      margin-bottom: 0.85rem;
      color: var(--first-color);
      border-bottom: 2px solid hsl(var(--hue-color), 69%, 61%);

    }
    .profile-card h3 { font-size: 1rem; margin: 0.9rem 0 0.35rem; }
    .profile-card .period { color: var(--text-color-light); font-size: 0.9rem; margin-bottom: 0.5rem; }
    .profile-card ul { margin-left: 1.25rem; line-height: 1.75; }
    .profile-card li { margin-bottom: 0.35rem; text-align: justify; }
    .highlight-list { list-style: none; margin-left: 0; padding-left: 0; }
    .highlight-list li {
      padding-left: 1.1rem;
      position: relative;
      margin-bottom: 0.45rem;
    }
    .highlight-list li::before {
      content: "▸";
      position: absolute;
      left: 0;
      color: var(--first-color);
      font-weight: bold;
    }
    .chipline { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.45rem; }
    .chipline span {
      border: 1px solid var(--first-color);
      color: var(--first-color);
      border-radius: 999px;
      padding: 0.2rem 0.65rem;

    }
    .project-item {
      border-top: 1px solid hsl(var(--hue-color), 12%, 88%);

    }
    body.dark-theme .project-item { border-top-color: hsl(var(--hue-color), 12%, 28%); }
    .project-item:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }
    .project-item h3 { margin-top: 0; }
    .project-item .stack { font-size: 0.85rem; color: var(--text-color-light); margin: 0.25rem 0 0.5rem; }

    .project-context {
      font-size: 0.9rem;
      color: var(--first-color);
      font-weight: 600;
      margin: 0.2rem 0 0.45rem;
    }
    .cert-list { list-style: none; margin-left: 0; padding-left: 0; }
    .cert-list li { margin-bottom: 0.65rem; line-height: 1.5; }

    .profile-skeleton {
      display: grid;
      gap: 1rem;
    }
    .profile-skeleton__hero,
    .profile-skeleton__bar,
    .profile-skeleton__card {
      border-radius: 14px;
      border: 1px solid rgba(123, 196, 255, 0.28);
      background: linear-gradient(165deg, rgba(7, 20, 40, 0.92), rgba(11, 34, 72, 0.88));
      box-shadow: inset 0 0 24px rgba(58, 148, 255, 0.08);
      padding: 1.25rem 1.35rem;
      position: relative;
      overflow: hidden;
    }
    .profile-skeleton__hero { min-height: 168px; }
    .profile-skeleton__bar { min-height: 72px; }
    .profile-skeleton__card { min-height: 120px; }
    .profile-skeleton__line {
      height: 10px;
      border-radius: 999px;
      margin-bottom: 0.65rem;
      background: rgba(123, 196, 255, 0.14);
      position: relative;
      overflow: hidden;
    }
    .profile-skeleton__line--short { width: 42%; }
    .profile-skeleton__line--mid { width: 68%; }
    .profile-skeleton__line--long { width: 92%; }
    .profile-skeleton__line::after,
    .profile-skeleton__hero::after,
    .profile-skeleton__bar::after,
    .profile-skeleton__card::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(
        90deg,
        transparent,
        rgba(94, 234, 212, 0.12),
        rgba(58, 140, 255, 0.22),
        transparent
      );
      animation: profileSkeletonShimmer 1.4s ease-in-out infinite;
    }
    .profile-skeleton__status {
      margin: 0.35rem 0 0;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #5eead4;
      font-weight: 600;
    }
    @keyframes profileSkeletonShimmer {
      100% { transform: translateX(100%); }
    }
    @media (prefers-reduced-motion: reduce) {
      .profile-skeleton__line::after,
      .profile-skeleton__hero::after,
      .profile-skeleton__bar::after,
      .profile-skeleton__card::after {
        animation: none;
      }
    }

    @media print {
      .header, .resume-bar, .profile-nav, .no-print { display: none !important; }
      .profile-page { margin-top: 0; max-width: 100%; }
      .profile-hero, .profile-card {
        border: none;
        box-shadow: none;
        page-break-inside: avoid;
      }
      body { background: #fff; color: #111; }
      .profile-card h2 { color: #111; border-color: #333; }
      .chipline span { border-color: #333; color: #111; }
      a { color: #111; text-decoration: underline; }
    }

<body>
  <header class="header" id="header">
    <nav class="nav container">
      <a href="index.html" class="nav__logo no-print"><i class="uil uil-arrow-left"></i> Back to Portfolio</a>
      <div class="nav__btns no-print">
        <i class="uil uil-moon change-theme" id="theme-button"></i>
      </div>
    </nav>
  </header>

  <main class="profile-page" id="profile-root">
    <div class="profile-skeleton" aria-busy="true" aria-live="polite">
      <div class="profile-skeleton__hero">
        <div class="profile-skeleton__line profile-skeleton__line--short"></div>
        <div class="profile-skeleton__line profile-skeleton__line--mid"></div>
        <div class="profile-skeleton__line profile-skeleton__line--long"></div>
        <p class="profile-skeleton__status">Loading profile data</p>
      </div>
      <div class="profile-skeleton__bar">
        <div class="profile-skeleton__line profile-skeleton__line--mid"></div>
        <div class="profile-skeleton__line profile-skeleton__line--long"></div>
      </div>
      <div class="profile-skeleton__card">
        <div class="profile-skeleton__line profile-skeleton__line--short"></div>
        <div class="profile-skeleton__line profile-skeleton__line--long"></div>
        <div class="profile-skeleton__line profile-skeleton__line--long"></div>
      </div>
      <div class="profile-skeleton__card">
        <div class="profile-skeleton__line profile-skeleton__line--short"></div>
        <div class="profile-skeleton__line profile-skeleton__line--long"></div>
      </div>
    </div>
  </main>

  <script>
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    const themeButton = document.getElementById("theme-button");
    const darkTheme = "dark-theme";
    const iconTheme = "uil-sun";
    const selectedTheme = localStorage.getItem("selected-theme");
    const selectedIcon = localStorage.getItem("selected-icon");
    const getCurrentTheme = () => (document.body.classList.contains(darkTheme) ? "dark" : "light");
    const getCurrentIcon = () => (themeButton.classList.contains(iconTheme) ? "uil-moon" : "uil-sun");
    if (selectedTheme) {
      document.body.classList[selectedTheme === "dark" ? "add" : "remove"](darkTheme);
      themeButton.classList[selectedIcon === "uil-moon" ? "add" : "remove"](iconTheme);
    }
    themeButton.addEventListener("click", () => {
      document.body.classList.toggle(darkTheme);
      themeButton.classList.toggle(iconTheme);
      localStorage.setItem("selected-theme", getCurrentTheme());
      localStorage.setItem("selected-icon", getCurrentIcon());
    });

    async function loadProfile() {
      const res = await fetch("./content/profile-data.json");
      const data = await res.json();
      const b = data.basics;
      const pdf = b.resumePdf || "./content/Harish-Kumar-Resume.pdf";
      const md = b.resumeMd || "./content/resume.md";

      const root = document.getElementById("profile-root");
      root.innerHTML = `
        <section class="profile-hero" id="top">
          <h1>${escapeHtml(b.name)}</h1>
          <p class="role">${escapeHtml(b.title)}</p>
          <p class="summary">${escapeHtml(b.summary)}</p>
          <div class="contact-grid">
            <span><strong>Email:</strong> <a href="mailto:${escapeHtml(b.email)}">${escapeHtml(b.email)}</a></span>
            <span><strong>Phone:</strong> ${escapeHtml(b.phone)}</span>
            <span><strong>Location:</strong> ${escapeHtml(b.location)}</span>
            <span><strong>Portfolio:</strong> <a href="${escapeHtml(b.portfolio || "https://harish-nika.github.io/")}" target="_blank" rel="noopener noreferrer">${escapeHtml(b.portfolio || "harish-nika.github.io")}</a></span>
            <span><strong>LinkedIn:</strong> <a href="${escapeHtml(b.linkedin)}" target="_blank" rel="noopener noreferrer">Profile</a></span>
            <span><strong>GitHub:</strong> <a href="${escapeHtml(b.github)}" target="_blank" rel="noopener noreferrer">Harish-nika</a></span>
          </div>
          ${(b.highlights || []).length ? `<ul class="highlight-list">${b.highlights.map((h) => `<li>${escapeHtml(h)}</li>`).join("")}</ul>` : ""}
        </section>

        <div class="resume-bar no-print" id="resume">
          <span class="resume-bar__label"><i class="uil uil-file-download"></i> Resume</span>
          <span class="resume-bar__hint">Download or print a single-page-friendly PDF with experience, projects (with context), skills, and certificate links.</span>
          <a class="button button--flex button--small" href="${escapeHtml(pdf)}" download="Harish-Kumar-Resume.pdf">
            <i class="uil uil-file-alt"></i> Download PDF
          </a>
          <a class="button button--flex button--small button--ghost" href="${escapeHtml(md)}" download="Harish-Kumar-Resume.md">
            <i class="uil uil-file"></i> Markdown
          </a>
          <button type="button" class="button button--flex button--small button--ghost" onclick="window.print()">
            <i class="uil uil-print"></i> Print
          </button>
          <a class="button button--flex button--small button--ghost" href="${escapeHtml(b.resumeLink)}" target="_blank" rel="noopener noreferrer">
            <i class="uil uil-cloud-download"></i> Google Drive
          </a>
        </div>

        <nav class="profile-nav no-print" aria-label="Profile sections">
          <a href="#experience">Experience</a>
          <a href="#skills">Skills</a>
          <a href="#projects">Projects</a>
          <a href="#education">Education</a>
          <a href="#certifications">Certifications</a>
        </nav>

        <section class="profile-card" id="experience">
          <h2>Experience</h2>
          ${data.experience
            .map(
              (e) => `
            <div>
              <h3>${escapeHtml(e.role)}</h3>
              <p class="period">${escapeHtml(e.company)} · ${escapeHtml(e.period)}</p>
              <ul>${e.highlights.map((h) => `<li>${escapeHtml(h)}</li>`).join("")}</ul>
            </div>`
            )
            .join("")}
        </section>

        <section class="profile-card" id="skills">
          <h2>Technical Skills</h2>
          <p><strong>AI / ML</strong></p>
          <div class="chipline">${data.skills.ai_ml.map((s) => `<span>${escapeHtml(s)}</span>`).join("")}</div>
          <p style="margin-top:1rem;"><strong>Engineering</strong></p>
          <div class="chipline">${data.skills.engineering.map((s) => `<span>${escapeHtml(s)}</span>`).join("")}</div>
          <p style="margin-top:1rem;"><strong>DevOps / GitOps</strong></p>
          <div class="chipline">${data.skills.devops_gitops.map((s) => `<span>${escapeHtml(s)}</span>`).join("")}</div>
          ${
            b.keywords?.length
              ? `<p style="margin-top:1.2rem;"><strong>Core keywords</strong></p><p class="keywords-block">${b.keywords.map(escapeHtml).join(" · ")}</p>`
              : ""
          }
        </section>

        <section class="profile-card" id="projects">
          <h2>Selected Projects</h2>
          <p style="margin-bottom:0.5rem; line-height:1.65;">Production and research work with case studies on the portfolio. <a href="index.html#Projects">View all on main site</a>.</p>
          ${data.projects
            .map(
              (p) => `
            <article class="project-item">
              <h3><a href="${escapeHtml(p.link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(p.name)}</a></h3>
              <p class="project-context">${escapeHtml(p.context || "")}</p>
              <p class="stack">${escapeHtml(p.stack.join(" · "))}</p>
              <p class="desc">${escapeHtml(p.summary || "")}</p>
              <div class="project-links">
                <a href="${escapeHtml(p.link)}" target="_blank" rel="noopener noreferrer">Case study</a>
                ${p.github ? `<a href="${escapeHtml(p.github)}" target="_blank" rel="noopener noreferrer">GitHub</a>` : ""}
              </div>
            </article>`
            )
            .join("")}
        </section>

        <section class="profile-card" id="education">
          <h2>Education</h2>
          ${data.education
            .map(
              (edu) => `
            <div class="edu-row">
              <strong>${escapeHtml(edu.degree)}</strong>
              <span>${escapeHtml(edu.institution)} (${escapeHtml(edu.period)}) — ${escapeHtml(edu.score)}</span>
            </div>`
            )
            .join("")}
        </section>

        <section class="profile-card" id="certifications">
          <h2>Certifications</h2>
          <ul class="cert-list">${data.certifications
            .map((c) => {
              const name = typeof c === "string" ? c : c.name;
              const link = typeof c === "string" ? "" : c.link;
              return link
                ? `<li><a href="${escapeHtml(link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(name)}</a></li>`
                : `<li>${escapeHtml(name)}</li>`;
            })
            .join("")}</ul>
        </section>

        <p class="no-print" style="text-align:center; margin-top:1.5rem;">
          <a href="index.html" class="button button--flex button--ghost"><i class="uil uil-arrow-left"></i> Back to Portfolio</a>
        </p>
      `;
      document.title = `Full Profile & Resume - ${b.name}`;
    }

    loadProfile().catch(() => {
      document.getElementById("profile-root").innerHTML =
        "<p>Could not load profile data. Please refresh.</p>";
    });
  </script>
  <script src="./assets/js/portfolio-transitions.js"></script>
</body>
</html>
